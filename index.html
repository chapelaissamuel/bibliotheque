<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="#E8734A">
<meta name="theme-color" content="#E8734A">
<title>📚 La bibliothèque de Perrine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cream:#FFFBF5;--warm:#FFF3E4;--text:#3D2C2C;--tl:#8B7676;--accent:#E8734A;--success:#27AE60;--shadow:0 2px 16px rgba(61,44,44,.07);--shadow-lg:0 8px 32px rgba(61,44,44,.12);--r:20px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;max-width:540px;margin:0 auto;overflow-x:hidden}
button{font-family:'Quicksand',sans-serif;cursor:pointer;border:none}
input{font-family:'Quicksand',sans-serif}
.boo{font-family:'Baloo 2',cursive}
.hide{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.08)}70%{transform:scale(.96)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes starBurst{0%{transform:scale(0) rotate(0);opacity:0}50%{transform:scale(1.4) rotate(20deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
.ch{transition:transform .15s,box-shadow .15s}.ch:active{transform:scale(.97)!important}
::-webkit-scrollbar{width:0;height:0}
@media print{.nopr{display:none!important}.prc{break-inside:avoid;page-break-inside:avoid;border:2px solid #ddd!important;margin:8px!important}body{background:#fff}}
.header{background:linear-gradient(135deg,#E8734A 0%,#F4A261 100%);padding:18px 20px 14px;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(232,115,74,.3)}
.header h1{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;line-height:1.2}
.header p{font-size:.82rem;opacity:.85;font-weight:600;margin-top:2px}
.back-btn{background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border:none;color:#fff;border-radius:12px;padding:8px 18px;font-size:.85rem;font-weight:700;margin-bottom:6px;display:inline-flex;align-items:center;gap:6px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.03em;color:#fff;text-transform:uppercase}
.search{width:100%;padding:14px 16px 14px 44px;border-radius:16px;border:2px solid rgba(0,0,0,.05);background:#fff;font-size:.95rem;font-weight:600;outline:none;box-shadow:var(--shadow);color:var(--text)}
.search:focus{border-color:var(--accent)}
.chip{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:.8rem;font-weight:700;border:none;white-space:nowrap}
.chip-on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(232,115,74,.3)}
.chip-off{background:#fff;color:var(--text);box-shadow:var(--shadow)}
.album-card{background:#fff;border-radius:var(--r);padding:22px 12px 16px;text-align:center;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.album-card .emoji{font-size:3.2rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.album-card .t{font-family:'Baloo 2',cursive;font-size:.85rem;font-weight:700;line-height:1.25}
.album-card .a{font-size:.7rem;color:var(--tl);font-weight:600}
.act-card{background:#fff;border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow)}
.act-card .ae{font-size:2rem;flex-shrink:0}
.act-card .al{font-family:'Baloo 2',cursive;font-weight:700;font-size:.95rem}
.act-card .ad{font-size:.78rem;color:var(--tl);font-weight:600}
.fs{position:fixed;inset:0;background:var(--cream);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fs .close{position:absolute;top:14px;left:16px;background:rgba(0,0,0,.06);border:none;border-radius:14px;padding:10px 18px;font-size:.9rem;font-weight:800;color:var(--text)}
.fs .counter{position:absolute;top:16px;right:18px;background:rgba(0,0,0,.06);border-radius:20px;padding:6px 14px;font-size:.82rem;font-weight:800;color:var(--tl)}
.btn{padding:12px 24px;border-radius:16px;font-weight:700;font-size:.95rem;background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(232,115,74,.25)}
.btn-off{background:#e0d5cc;color:#b5a89e;box-shadow:none}
.btn-ok{background:var(--success);box-shadow:0 4px 12px rgba(39,174,96,.25)}
.script-btn{padding:8px 16px;border-radius:12px;font-size:.8rem;font-weight:700;border:2px solid rgba(0,0,0,.06);background:#fff;color:var(--tl)}
.script-on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(232,115,74,.25)}
.cnt-choice{width:72px;height:72px;border-radius:20px;font-size:2rem;font-weight:900;font-family:'Baloo 2',cursive;background:#fff;color:var(--text);border:3px solid rgba(0,0,0,.06);box-shadow:var(--shadow)}
.slot{width:30px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;font-family:'Baloo 2',cursive;border:2px dashed rgba(0,0,0,.15);background:#fff;transition:all .15s}
.slot-ok{border:2px solid var(--success);background:#e8faf1;color:var(--success)}
.let-btn{width:36px;height:42px;border-radius:10px;font-size:1rem;font-weight:900;font-family:'Baloo 2',cursive;background:#fff;color:var(--text);border:2px solid rgba(0,0,0,.06);box-shadow:var(--shadow);transition:all .15s}
.star-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2000}
.pcard{background:#fff;border-radius:16px;padding:20px 10px 14px;text-align:center;box-shadow:var(--shadow);border:2px solid rgba(0,0,0,.04)}
.pcard .pe{font-size:3.5rem;display:block;line-height:1}
.pcard .pw{font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;margin-top:8px}
.pcard .ps{font-size:.8rem;font-weight:600;color:var(--tl);margin-top:2px}
</style>
</head>
<body>

<div id="app"></div>

<script>
// =============================================================================
// 📚 LA BIBLIOTHÈQUE DE PERRINE — App autonome
// Perrine : pour ajouter un album, copie un bloc dans ALBUMS et modifie !
// =============================================================================

const ALBUMS = [
  {
    id:"jadore-lecole", title:"J'adore l'école", author:"Tracey Corderoy & Tim Warnes",
    themes:["rentrée"], levels:["PS","MS","GS"], coverEmoji:"🦏",
    countItem:{name:"rhinocéros",emoji:"🦏"},
    vocabulary:[
      {word:"un rhinocéros",emoji:"🦏"},{word:"jouer",emoji:"🎮"},{word:"une maison",emoji:"🏠"},
      {word:"une école",emoji:"🏫"},{word:"un calendrier",emoji:"📅"},{word:"un cube",emoji:"🟨"},
      {word:"un cartable",emoji:"🎒"},{word:"dormir",emoji:"😴"},{word:"une route",emoji:"🛤️"},
      {word:"lire",emoji:"📖"},{word:"un dessin",emoji:"🖍️"}
    ],
    titleLetters:"J ' A D O R E   L ' É C O L E".split(" ")
  },
  {
    id:"je-veux-pas", title:"Je veux pas aller à l'école", author:"Stephanie Blake",
    themes:["rentrée"], levels:["PS","MS","GS"], coverEmoji:"🐰",
    countItem:{name:"lapin",emoji:"🐰"},
    vocabulary:[
      {word:"un lapin",emoji:"🐰"},{word:"une école",emoji:"🏫"},{word:"l'alphabet",emoji:"🔤"},
      {word:"une tartine",emoji:"🍞"},{word:"pleurer",emoji:"😢"},{word:"dessiner",emoji:"✏️"},
      {word:"jouer",emoji:"🧩"},{word:"manger",emoji:"🍽️"},{word:"une mousse au chocolat",emoji:"🍫"},
      {word:"se reposer",emoji:"💤"},{word:"tambouriner",emoji:"🥁"}
    ],
    titleLetters:"J E   V E U X   P A S   A L L E R   À   L ' É C O L E".split(" ")
  },
  {
    id:"petit-lapin-blanc", title:"Petit Lapin Blanc à la maternelle", author:"Marie-France Floury",
    themes:["rentrée"], levels:["PS","MS"], coverEmoji:"🐇",
    countItem:{name:"lapin",emoji:"🐇"},
    vocabulary:[
      {word:"une école",emoji:"🏫"},{word:"une maîtresse",emoji:"👩‍🏫"},{word:"un doudou",emoji:"🧸"},
      {word:"un panier",emoji:"🧺"},{word:"un bisou",emoji:"💋"},{word:"un lapin",emoji:"🐇"},
      {word:"blanc",emoji:"⬜"},{word:"un cube",emoji:"🟦"},{word:"chanter",emoji:"🎶"},
      {word:"un escargot",emoji:"🐌"},{word:"une tortue en peluche",emoji:"🐢"},
      {word:"des toilettes",emoji:"🚽"},{word:"se laver les mains",emoji:"🧼"},
      {word:"un pantalon",emoji:"👖"},{word:"la cantine",emoji:"🍽️"},{word:"un brocoli",emoji:"🥦"},
      {word:"une cuisinière",emoji:"👩‍🍳"},{word:"dormir",emoji:"😴"},{word:"la sieste",emoji:"🛏️"},
      {word:"s'habiller",emoji:"👕"},{word:"un pull",emoji:"🧶"}
    ],
    titleLetters:"P E T I T   L A P I N   B L A N C   À   L A   M A T E R N E L L E".split(" ")
  }
];

const THEMES={rentrée:{color:"#E8734A",emoji:"🏫",label:"Rentrée"},automne:{color:"#D4762C",emoji:"🍂",label:"Automne"},noël:{color:"#C0392B",emoji:"🎄",label:"Noël"},hiver:{color:"#2E86C1",emoji:"❄️",label:"Hiver"},printemps:{color:"#27AE60",emoji:"🌸",label:"Printemps"},animaux:{color:"#8E44AD",emoji:"🐾",label:"Animaux"}};
const LCOL={PS:"#E8734A",MS:"#2E86C1",GS:"#8E44AD"};

// =============================================================================
// État global
// =============================================================================
let state = { view:"home", album:null, filter:null, search:"",
  vocabIdx:0, vocabScript:"capitales", vocabAnim:false,
  cntCount:0, cntChoices:[], cntFb:null, cntScore:0, cntTotal:0,
  titlePlaced:[], titleAvail:[], titleDone:false };

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// =============================================================================
// Rendu
// =============================================================================
function render() {
  const app = document.getElementById("app");
  const s = state;
  if (s.view === "vocab") { app.innerHTML = renderVocab(); bindVocab(); return; }
  if (s.view === "count") { app.innerHTML = renderCount(); bindCount(); return; }
  if (s.view === "title") { app.innerHTML = renderTitle(); bindTitle(); return; }
  if (s.view === "print") { app.innerHTML = renderPrint(); bindPrint(); return; }
  if (s.view === "album") { app.innerHTML = renderAlbum(); bindAlbum(); return; }
  app.innerHTML = renderHome();
  bindHome();
}

// =============================================================================
// 🏠 ACCUEIL
// =============================================================================
function renderHome() {
  const q = state.search.toLowerCase();
  const f = state.filter;
  const albums = ALBUMS.filter(a => {
    const ms = !q || a.title.toLowerCase().includes(q) || a.author.toLowerCase().includes(q) || a.themes.some(t=>t.includes(q));
    const mt = !f || a.themes.includes(f);
    return ms && mt;
  });
  const themes = [...new Set(ALBUMS.flatMap(a=>a.themes))];

  return `
    <div class="header nopr"><h1>📚 La bibliothèque de Perrine</h1><p>Mes albums de classe</p></div>
    <div style="padding:12px 16px 4px;position:relative" class="nopr">
      <span style="position:absolute;left:30px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.35;pointer-events:none">🔍</span>
      <input class="search" id="searchInput" type="text" placeholder="Chercher un album…" value="${state.search}">
    </div>
    <div style="display:flex;gap:8px;padding:6px 16px 10px;overflow-x:auto" class="nopr">
      <button class="chip ch ${!f?'chip-on':'chip-off'}" data-filter="">Tous</button>
      ${themes.map(t=>{
        const c=THEMES[t]||{color:"#888",emoji:"📌",label:t};
        return `<button class="chip ch ${f===t?'chip-on':'chip-off'}" data-filter="${t}" style="${f===t?'background:'+c.color:''}">${c.emoji} ${c.label}</button>`;
      }).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:4px 16px 120px">
      ${albums.length ? albums.map((a,i)=>`
        <div class="album-card ch" data-album="${a.id}" style="animation:fadeUp .4s ${i*.07}s both">
          <span class="emoji">${a.coverEmoji}</span>
          <p class="t">${a.title}</p>
          <p class="a">${a.author}</p>
          <div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center">
            ${a.themes.map(t=>`<span class="badge" style="background:${(THEMES[t]||{color:"#888"}).color}">${(THEMES[t]||{label:t}).label}</span>`).join("")}
          </div>
          <div style="display:flex;gap:3px">
            ${a.levels.map(l=>`<span class="badge" style="background:${LCOL[l]||"#888"}">${l}</span>`).join("")}
          </div>
        </div>
      `).join("") : `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--tl)"><span style="font-size:2.5rem">🤷</span><p style="font-weight:700;margin-top:8px">Aucun album trouvé</p></div>`}
    </div>`;
}
function bindHome() {
  document.getElementById("searchInput")?.addEventListener("input", e => setState({search:e.target.value}));
  document.querySelectorAll("[data-filter]").forEach(b => b.addEventListener("click", () => {
    const v = b.dataset.filter;
    setState({filter: v === state.filter || v === "" ? null : v});
  }));
  document.querySelectorAll("[data-album]").forEach(c => c.addEventListener("click", () => {
    const a = ALBUMS.find(x=>x.id===c.dataset.album);
    if(a) setState({view:"album",album:a});
  }));
}

// =============================================================================
// 📖 PAGE ALBUM
// =============================================================================
function renderAlbum() {
  const a = state.album;
  const acts = [
    {key:"vocab",emoji:"🖼️",label:"Les mots",desc:a.vocabulary.length+" cartes vocabulaire"},
    {key:"count",emoji:"🔢",label:"On compte !",desc:"Compter les "+a.countItem.name+"s"},
    {key:"title",emoji:"🔤",label:"Le titre",desc:"Reconstituer le titre"},
    {key:"print",emoji:"🖨️",label:"Imprimer les cartes",desc:"Toutes les cartes à imprimer"},
  ];
  return `
    <div class="header nopr">
      <button class="back-btn" id="backHome">◂ Mes albums</button>
      <h1 style="font-size:${a.title.length>20?'1.1rem':'1.3rem'}">${a.title}</h1>
      <p>${a.author}</p>
    </div>
    <div style="text-align:center;padding:24px 20px 8px">
      <span style="font-size:4.5rem;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.12))">${a.coverEmoji}</span>
      <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:12px">
        ${a.themes.map(t=>`<span class="badge" style="background:${(THEMES[t]||{color:"#888"}).color}">${(THEMES[t]||{emoji:"📌"}).emoji} ${(THEMES[t]||{label:t}).label}</span>`).join("")}
        ${a.levels.map(l=>`<span class="badge" style="background:${LCOL[l]||"#888"}">${l}</span>`).join("")}
      </div>
    </div>
    <p style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tl);padding:16px 20px 6px">Activités</p>
    <div style="display:flex;flex-direction:column;gap:10px;padding:0 16px 100px">
      ${acts.map((ac,i)=>`
        <div class="act-card ch" data-act="${ac.key}" style="animation:fadeUp .3s ${i*.06}s both">
          <span class="ae">${ac.emoji}</span>
          <div style="flex:1"><p class="al">${ac.label}</p><p class="ad">${ac.desc}</p></div>
          <span style="font-size:1.2rem;opacity:.25">›</span>
        </div>`).join("")}
    </div>`;
}
function bindAlbum() {
  document.getElementById("backHome")?.addEventListener("click", ()=>setState({view:"home",album:null}));
  document.querySelectorAll("[data-act]").forEach(c => c.addEventListener("click", () => {
    const k = c.dataset.act;
    if(k==="vocab") setState({view:"vocab",vocabIdx:0,vocabScript:"capitales",vocabAnim:false});
    else if(k==="count") { genCount(); setState({view:"count"}); }
    else if(k==="title") { resetTitle(); setState({view:"title"}); }
    else if(k==="print") setState({view:"print"});
  }));
}

// =============================================================================
// 🖼️ CARTES VOCABULAIRE
// =============================================================================
function renderVocab() {
  const a=state.album, v=a.vocabulary, i=state.vocabIdx, sc=state.vocabScript;
  const card=v[i];
  const fmt = w => sc==="capitales" ? w.toUpperCase() : w.toLowerCase();
  const isFirst=i===0, isLast=i===v.length-1;
  return `
    <div class="fs" id="vocabScreen">
      <button class="close nopr" id="vocabClose">✕</button>
      <div class="counter nopr">${i+1} / ${v.length}</div>
      <span style="font-size:7rem;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1));transition:all .15s;${state.vocabAnim?'transform:scale(.7);opacity:.3':''}" id="vocabEmoji">${card.emoji}</span>
      <p class="boo" style="font-size:2.5rem;font-weight:800;text-align:center;margin-top:20px;padding:0 24px;line-height:1.15;color:var(--text);${sc==='cursives'?'font-style:italic;':''}${state.vocabAnim?'opacity:0;':''}transition:opacity .14s">${fmt(card.word)}</p>
      <div style="display:flex;gap:8px;position:absolute;bottom:110px" class="nopr">
        ${["capitales","scriptes","cursives"].map(k=>`<button class="script-btn ch ${sc===k?'script-on':''}" data-script="${k}">${k==="capitales"?"ABC":k==="scriptes"?"abc":"𝒶𝒷𝒸"}</button>`).join("")}
      </div>
      <div style="display:flex;gap:14px;position:absolute;bottom:40px" class="nopr">
        <button class="btn ch ${isFirst?'btn-off':''}" id="vocabPrev">◂ Avant</button>
        <button class="btn ch ${isLast?'btn-off':''}" id="vocabNext">Suivant ▸</button>
      </div>
    </div>`;
}
function bindVocab() {
  const v=state.album.vocabulary;
  document.getElementById("vocabClose")?.addEventListener("click",()=>setState({view:"album"}));
  document.getElementById("vocabPrev")?.addEventListener("click",()=>{if(state.vocabIdx>0)goVocab(-1)});
  document.getElementById("vocabNext")?.addEventListener("click",()=>{if(state.vocabIdx<v.length-1)goVocab(1)});
  document.querySelectorAll("[data-script]").forEach(b=>b.addEventListener("click",()=>setState({vocabScript:b.dataset.script})));
  let tx=null;
  const el=document.getElementById("vocabScreen");
  el?.addEventListener("touchstart",e=>{tx=e.touches[0].clientX},{passive:true});
  el?.addEventListener("touchend",e=>{if(tx===null)return;const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){if(d<0&&state.vocabIdx<v.length-1)goVocab(1);if(d>0&&state.vocabIdx>0)goVocab(-1)}tx=null},{passive:true});
}
function goVocab(dir){
  setState({vocabAnim:true});
  setTimeout(()=>setState({vocabIdx:state.vocabIdx+dir,vocabAnim:false}),140);
}

// =============================================================================
// 🖨️ IMPRESSION
// =============================================================================
function renderPrint() {
  const a=state.album;
  return `
    <div class="header nopr">
      <button class="back-btn" id="printBack">◂ Activités</button>
      <h1>🖨️ Imprimer les cartes</h1><p>${a.title}</p>
    </div>
    <div class="nopr" style="padding:16px;text-align:center">
      <button class="btn ch" id="printBtn">🖨️ Lancer l'impression</button>
      <p style="font-size:.78rem;color:var(--tl);margin-top:10px;font-weight:600">Astuce : choisis "2 pages par feuille" pour des cartes plus petites</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:8px 16px 40px">
      ${a.vocabulary.map(v=>`
        <div class="pcard prc">
          <span class="pe">${v.emoji}</span>
          <p class="pw">${v.word.toUpperCase()}</p>
          <p class="ps">${v.word}</p>
        </div>`).join("")}
    </div>`;
}
function bindPrint() {
  document.getElementById("printBack")?.addEventListener("click",()=>setState({view:"album"}));
  document.getElementById("printBtn")?.addEventListener("click",()=>window.print());
}

// =============================================================================
// 🔢 NUMÉRATION
// =============================================================================
function genCount() {
  const ans=Math.floor(Math.random()*5)+1;
  const s=new Set([ans]);
  while(s.size<3){let c=ans+(Math.random()<.5?1:-1)*(Math.floor(Math.random()*3)+1);if(c<1)c=ans+2;if(c>9)c=Math.max(1,ans-2);s.add(Math.max(1,c));}
  state.cntCount=ans;
  state.cntChoices=[...s].sort(()=>Math.random()-.5);
  state.cntFb=null;
}
function renderCount() {
  const a=state.album,cnt=state.cntCount,ch=state.cntChoices,fb=state.cntFb;
  return `
    <div class="fs">
      <button class="close nopr" id="cntClose">✕</button>
      <div class="counter nopr">⭐ ${state.cntScore}/${state.cntTotal}</div>
      <p class="boo" style="font-size:1.1rem;font-weight:700;color:var(--tl);margin-bottom:10px">Combien de ${a.countItem.name}s ? 🤔</p>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:300px;padding:10px">
        ${Array.from({length:cnt}).map((_,i)=>`<span style="font-size:3rem;animation:bounceIn .4s ${i*.07}s both">${a.countItem.emoji}</span>`).join("")}
      </div>
      <div style="display:flex;gap:14px;margin-top:28px">
        ${ch.map(c=>`<button class="cnt-choice ch" data-c="${c}" style="${fb==='ok'&&c===cnt?'background:var(--success);color:#fff;border-color:var(--success);transform:scale(1.12)':''}${fb==='no'?';animation:shake .35s':''}">${c}</button>`).join("")}
      </div>
      ${fb==='ok'?'<div class="star-overlay"><span style="font-size:5rem;animation:starBurst .5s both">⭐</span></div>':''}
    </div>`;
}
function bindCount() {
  document.getElementById("cntClose")?.addEventListener("click",()=>setState({view:"album",cntScore:0,cntTotal:0}));
  document.querySelectorAll("[data-c]").forEach(b=>b.addEventListener("click",()=>{
    if(state.cntFb)return;
    const c=parseInt(b.dataset.c);
    state.cntTotal++;
    if(c===state.cntCount){state.cntScore++;setState({cntFb:"ok"});setTimeout(()=>{genCount();setState({cntFb:null})},1200);}
    else{setState({cntFb:"no"});setTimeout(()=>setState({cntFb:null}),700);}
  }));
}

// =============================================================================
// 🔤 TITRE
// =============================================================================
function resetTitle() {
  const letters=state.album.titleLetters;
  const filtered=letters.map((l,i)=>({l,oi:i})).filter(x=>x.l!==" ");
  const shuffled=[...filtered].sort(()=>Math.random()-.5).map((x,i)=>({...x,id:i,used:false}));
  state.titlePlaced=[];
  state.titleAvail=shuffled;
  state.titleDone=false;
}
function renderTitle() {
  const letters=state.album.titleLetters, pl=state.titlePlaced, av=state.titleAvail, done=state.titleDone;
  const slotContent=i=>{const m=pl.find(p=>p.slot===i);return m?m.l:null;};

  return `
    <div class="fs" style="padding:16px">
      <button class="close nopr" id="titClose">✕</button>
      <p class="boo" style="font-size:1.1rem;font-weight:700;color:var(--tl);margin-bottom:20px;text-align:center">Reconstitue le titre ! 🔤</p>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:3px;max-width:380px">
        ${letters.map((l,i)=>{
          if(l===" ")return `<div style="width:14px"></div>`;
          const c=slotContent(i);
          return `<div class="slot ${c?'slot-ok':''}" ${c?'style="animation:bounceIn .25s both"':''}>${c||""}</div>`;
        }).join("")}
      </div>
      ${!done?`<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:5px;max-width:380px;margin-top:24px">
        ${av.map(item=>`<button class="let-btn ch" data-lid="${item.id}" style="opacity:${item.used?.15:1};transform:${item.used?'scale(.85)':'scale(1)'}">${item.l}</button>`).join("")}
      </div>`:''}
      ${done?`<div style="text-align:center;margin-top:24px"><span style="font-size:3rem;animation:starBurst .5s both">🎉</span><p class="boo" style="font-size:1.3rem;font-weight:800;color:var(--success);margin-top:4px">Bravo !</p><button class="btn btn-ok ch" id="titReplay" style="margin-top:12px">Rejouer 🔄</button></div>`:''}
      ${!done&&pl.length>0?`<button class="ch nopr" id="titReset" style="margin-top:20px;padding:8px 18px;border-radius:12px;background:rgba(0,0,0,.06);border:none;font-size:.82rem;font-weight:700;color:var(--tl)">Recommencer</button>`:''}
    </div>`;
}
function bindTitle() {
  document.getElementById("titClose")?.addEventListener("click",()=>setState({view:"album"}));
  document.getElementById("titReplay")?.addEventListener("click",()=>{resetTitle();render()});
  document.getElementById("titReset")?.addEventListener("click",()=>{resetTitle();render()});
  document.querySelectorAll("[data-lid]").forEach(b=>b.addEventListener("click",()=>{
    const id=parseInt(b.dataset.lid);
    const item=state.titleAvail.find(x=>x.id===id);
    if(!item||item.used||state.titleDone)return;
    const letters=state.album.titleLetters;
    // Trouver prochain slot
    let filled=0,ns=-1;
    for(let i=0;i<letters.length;i++){if(letters[i]===" ")continue;if(filled===state.titlePlaced.length){ns=i;break;}filled++;}
    if(ns===-1)return;
    if(item.l.toUpperCase()===letters[ns].toUpperCase()){
      state.titlePlaced.push({...item,slot:ns});
      state.titleAvail=state.titleAvail.map(x=>x.id===id?{...x,used:true}:x);
      if(state.titlePlaced.length===letters.filter(l=>l!==" ").length)state.titleDone=true;
      render();
    }
  }));
}

// =============================================================================
// 🚀 LANCEMENT
// =============================================================================
render();
</script>
</body>
</html>
